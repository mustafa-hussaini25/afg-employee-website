<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
    <meta name="author" content="نام برند">
    <meta name="description" content="رزرو  آنلاین خدمات در محل: جستجو،انتخاب متخصص،پرداخت امن و دریافت خدمات با کیفیت در خانه.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/cb6b12215d.js" crossorigin="anonymous"></script>
    <title>AFG Employee</title>
</head>
<body>
    
    <section class="hero">

      <span>
        <span class="dot"></span>
        بهترین کاریگران حرفه ای در دسترس شما
      </span>

      <h1> 
        کارگر مورد نظر خود را<span> به آسانی پیدا کنید</span>
      </h1>
      <p class="hero_description">
        نلدوان،رنگمال،میخانیک،برقکار و دیگر کاریگران ماهر را در سریعترین زمان پیدا کنید
      </p>

      <div class="search">
        <input type="text"placeholder="چه نوع خدمتی نیاز دارید؟"
        class="search_input">
        <button class="search_btn">
          جستجو
        </button>
      
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>

      <div class="feautures">

      <div>
        <i class="fa-solid fa-medal"></i>
        <span>
          تضمین کیفیت
        </span>
      </div>

      <div>
        <i class="fa-regular fa-clock"></i>
        <span>
          خدمات ۲۴ ساعته
        </span>
      </div>

      <div>
        <i class="fa-regular fa-thumbs-up"></i>
        <span>
          رضایت مشتریان
        </span>
      </div>

      </div>

      <div class="container">

        <div class="stat_card">
          <h3>۹۸٪</h3>
          <p>
            رضایت مشتریان
          </p>
        </div>

        <div class="stat_card">
          <h3>۱۲۰۰۰+</h3>
          <p>
            نیروی فعال
          </p>
        </div>

        <div class="stat_card">
          <h3>۲۵۰۰۰+</h3>
          <p>
            پروژه تکمیل شده
          </p>
        </div>
    </div>
    </section>
</body>
</html>
